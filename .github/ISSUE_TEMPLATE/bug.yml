name: Bug Report
description: Report something that is broken
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Be specific and include exact error output if possible.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reproducible steps.
      placeholder: |
        1. Run `...`
        2. Run `...`
        3. Observe `...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Kanban version
      description: Example `0.1.0`
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Example `macOS 15.3, Node 22.13.0, npm 10.9.2`
    validations:
      required: false
